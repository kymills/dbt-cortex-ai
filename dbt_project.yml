name: 'dbt_cortex_ai'
version: '1.0.0'
config-version: 2

profile: 'dbt_cortex_ai'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_cortex_ai:
    +copy_grants: true
    staging:
      +materialized: view
      +tags: ['staging']
    marts:
      +materialized: table
      +tags: ['ai_enrichment']
